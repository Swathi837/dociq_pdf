services:
  # ─────────────────────────────────────────────
  # Database — PostgreSQL 16 with pgvector
  # ─────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: dociq_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dociq
      POSTGRES_USER: dociq
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dociq -d dociq"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Cache + Message Broker — Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dociq_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────
  # Backend — FastAPI (Python)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dociq_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dociq:secret@db:5432/dociq
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─────────────────────────────────────────────
  # Celery Worker — background PDF processing
  # ─────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dociq_celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dociq:secret@db:5432/dociq
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2

  # ─────────────────────────────────────────────
  # Frontend — React + Vite (Node 20)
  # ─────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: dociq_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  redis_data:
